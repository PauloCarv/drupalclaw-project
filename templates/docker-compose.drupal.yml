# docker-compose.drupal.yml — Generated by drupal-stack skill.
# This file is placed in the workspace root and managed by the agent.
#
# Variables (replaced at generation time):
#   __DB_TYPE__       : mariadb | postgres | sqlite
#   __DB_PORT__       : host port for database (e.g. 3306, 5432)
#   __PHP_PORT__      : host port for nginx+PHP (e.g. 8085)
#   __PROJECT_NAME__  : docker compose project name

services:
  php:
    image: drupal-claw-php:latest
    build:
      context: .
      dockerfile: .piclaw/stack/Dockerfile.php
    volumes:
      - ./drupal:/var/www/html
    networks:
      - drupal-net
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=__DB_INTERNAL_PORT__
      - DB_NAME=drupal
      - DB_USER=drupal
      - DB_PASSWORD=drupal
      - DB_DRIVER=__DB_DRIVER__

  nginx:
    image: nginx:alpine
    ports:
      - "__PHP_PORT__:80"
    volumes:
      - ./drupal:/var/www/html
      - ./.piclaw/stack/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - drupal-net
    depends_on:
      - php

  db:
    image: __DB_IMAGE__
    ports:
      - "__DB_PORT__:__DB_INTERNAL_PORT__"
    environment:
      __DB_ENV__
    volumes:
      - drupal_db_data:/var/lib/__DB_DATA_DIR__
    networks:
      - drupal-net
    healthcheck:
      __DB_HEALTHCHECK__

networks:
  drupal-net:
    name: __PROJECT_NAME___drupal-net

volumes:
  drupal_db_data:
